<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Types — Nelson, BC</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4f0;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #6b6a65;
    --color-text-tertiary: #9b9a96;
    --color-border-tertiary: rgba(0,0,0,0.12);
    --color-border-secondary: rgba(0,0,0,0.22);
    --color-border-primary: rgba(0,0,0,0.35);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --font-sans: 'DM Sans', system-ui, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1e1e1c;
      --color-background-secondary: #2a2a28;
      --color-text-primary: #f0ede8;
      --color-text-secondary: #a8a7a2;
      --color-text-tertiary: #6b6a65;
      --color-border-tertiary: rgba(255,255,255,0.1);
      --color-border-secondary: rgba(255,255,255,0.18);
      --color-border-primary: rgba(255,255,255,0.28);
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    min-height: 100vh;
    padding: 0 1rem 3rem;
  }

  .page-wrap {
    max-width: 720px;
    margin: 0 auto;
  }

  .page-header { padding: 2rem 0 0; }
  .page-title { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
  .page-sub { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    padding: 1.5rem 0;
  }

  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1rem;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .card:hover { border-color: var(--color-border-primary); transform: translateY(-1px); }
  .card:active { transform: scale(0.98); }

  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 8px;
  }

  .card-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; line-height: 1.4; }
  .card-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
  .arrow { font-size: 11px; color: var(--color-text-tertiary); margin-top: 8px; }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-y: auto;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--color-background-primary);
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    width: 100%;
    max-width: 480px;
    padding: 1.5rem;
    margin-top: 1rem;
    margin-bottom: 2rem;
  }

  .modal-tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; margin-bottom: 10px; }
  .modal-title { font-size: 17px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.25rem; line-height: 1.5; }

  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px; }

  .field input, .field textarea {
    width: 100%;
    font-size: 14px;
    font-family: var(--font-sans);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--color-border-primary); }
  .field textarea { min-height: 90px; resize: vertical; }

  .btn-row { display: flex; gap: 8px; margin-top: 1.25rem; }

  .btn-primary {
    flex: 1;
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border: none;
    border-radius: var(--border-radius-md);
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    font-family: var(--font-sans);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.82; }

  .btn-cancel {
    background: transparent;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px 16px;
    font-size: 14px;
    font-family: var(--font-sans);
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-cancel:hover { background: var(--color-background-secondary); }

  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>
</head>
<body>
<div class="page-wrap">
  <h1 class="sr-only">AI agent types — Nelson, BC market research</h1>
  <div class="page-header">
    <div class="page-title">AI agent types</div>
    <div class="page-sub">Select an agent to tell us how it could help your business.</div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div id="modal-body"></div>
  </div>
</div>

<script>
const FORMSPREE = "https://formspree.io/f/mbdwpjap";
const THANKS    = "https://nelson-ai-survey.vercel.app/thanks.html";

const agents = [
  {cat:"Customer-facing", bg:"#EEEDFE", tx:"#3C3489", name:"Customer service agent",         desc:"Answers FAQs and handles inquiries 24/7 via website, email, or phone."},
  {cat:"Operations",      bg:"#E1F5EE", tx:"#085041", name:"Booking & scheduling agent",      desc:"Takes appointments, manages calendars, and sends reminders automatically."},
  {cat:"Finance",         bg:"#FAEEDA", tx:"#633806", name:"Invoicing & billing agent",        desc:"Generates invoices, chases payments, and reconciles transactions."},
  {cat:"Marketing",       bg:"#FAECE7", tx:"#712B13", name:"Social media & marketing agent",  desc:"Drafts posts, schedules content, and reports on engagement."},
  {cat:"Operations",      bg:"#E1F5EE", tx:"#085041", name:"Inventory management agent",      desc:"Tracks stock, triggers reorders, and forecasts demand."},
  {cat:"HR",              bg:"#E6F1FB", tx:"#0C447C", name:"HR & onboarding agent",           desc:"Screens applicants, schedules interviews, and sends onboarding docs."},
  {cat:"Insights",        bg:"#EEEDFE", tx:"#3C3489", name:"Sales & leads agent",             desc:"Qualifies leads, follows up with prospects, and summarises pipeline activity."},
  {cat:"Marketing",       bg:"#FAECE7", tx:"#712B13", name:"Content & copywriting agent",     desc:"Writes product descriptions, blog posts, menus, and newsletters."},
  {cat:"Operations",      bg:"#EAF3DE", tx:"#27500A", name:"Maintenance & task dispatch agent",desc:"Assigns work orders and tracks job status for hospitality and property businesses."},
  {cat:"Customer-facing", bg:"#FBEAF0", tx:"#72243E", name:"Reviews & reputation agent",      desc:"Monitors Google and Tripadvisor, drafts responses, and flags negative feedback."},
  {cat:"Insights",        bg:"#E6F1FB", tx:"#0C447C", name:"Reporting & analytics agent",     desc:"Pulls data from your tools and generates plain-English summaries."},
  {cat:"Integration",     bg:"#FAEEDA", tx:"#633806", name:"Workflow automation agent",        desc:"Connects your apps so actions in one trigger steps in another automatically."},
];

const grid    = document.getElementById("grid");
const overlay = document.getElementById("overlay");

agents.forEach(a => {
  const card = document.createElement("div");
  card.className = "card";
  card.setAttribute("tabindex", "0");
  card.setAttribute("role", "button");
  card.setAttribute("aria-label", "Open feedback form for " + a.name);
  card.innerHTML = `
    <span class="tag" style="background:${a.bg};color:${a.tx}">${a.cat}</span>
    <div class="card-name">${a.name}</div>
    <div class="card-desc">${a.desc}</div>
    <div class="arrow"><i class="ti ti-arrow-right" aria-hidden="true"></i> Share interest</div>
  `;
  card.addEventListener("click", () => openModal(a));
  card.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openModal(a); }});
  grid.appendChild(card);
});

function openModal(agent) {
  document.getElementById("modal-body").innerHTML = formHTML(agent);
  overlay.classList.add("open");
  overlay.querySelector("input").focus();
}

function formHTML(agent) {
  return `
    <span class="modal-tag" style="background:${agent.bg};color:${agent.tx}">${agent.cat}</span>
    <div class="modal-title" id="modal-title">${agent.name}</div>
    <div class="modal-sub">${agent.desc}</div>
    <form action="${FORMSPREE}" method="POST">
      <input type="hidden" name="agent" value="${agent.name}">
      <input type="hidden" name="_next" value="${THANKS}">
      <div class="field">
        <label for="f-name">Your name</label>
        <input id="f-name" name="name" type="text" placeholder="Jane Smith" required autocomplete="name">
      </div>
      <div class="field">
        <label for="f-email">Email address</label>
        <input id="f-email" name="email" type="email" placeholder="jane@yourbusiness.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="f-biz">Business name</label>
        <input id="f-biz" name="business" type="text" placeholder="e.g. Kootenay Coffee Co." required>
      </div>
      <div class="field">
        <label for="f-need">What do you need this agent to do?</label>
        <textarea id="f-need" name="needs" placeholder="Describe the tasks or problems you'd like it to handle for your business…" required></textarea>
      </div>
      <div class="btn-row">
        <button type="button" class="btn-cancel" id="cancel-btn">Cancel</button>
        <button type="submit" class="btn-primary">Submit <i class="ti ti-send" aria-hidden="true"></i></button>
      </div>
    </form>
  `;
}

overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
document.addEventListener("click", e => { if (e.target && e.target.id === "cancel-btn") closeModal(); });
function closeModal() { overlay.classList.remove("open"); }
</script>
</body>
</html>
