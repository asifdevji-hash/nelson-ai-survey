<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks — AI Agent Interest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F4EE;
    --ink: #1A1A18;
    --muted: #6B6A65;
    --border: #E0DDD6;
    --green-bg: #E1F5EE;
    --green-tx: #085041;
    --green-mid: #1D9E75;
  }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: #fff;
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 3rem 2.5rem;
    max-width: 420px;
    width: 100%;
    text-align: center;
    animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .check {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--green-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    animation: pop 0.4s 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.6); }
    to   { opacity: 1; transform: scale(1); }
  }

  .check svg {
    width: 26px;
    height: 26px;
    stroke: var(--green-mid);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  .check svg path {
    stroke-dasharray: 40;
    stroke-dashoffset: 40;
    animation: draw 0.4s 0.5s ease forwards;
  }

  @keyframes draw {
    to { stroke-dashoffset: 0; }
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 0.75rem;
    line-height: 1.2;
  }

  p {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 2rem;
  }

  .back {
    display: inline-block;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    transition: background 0.15s;
  }

  .back:hover { background: var(--cream); }

  .divider {
    border: none;
    border-top: 0.5px solid var(--border);
    margin: 2rem 0;
  }

  .footer {
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="card">
  <div class="check">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M5 13l4 4L19 7"/>
    </svg>
  </div>

  <h1>Thanks for your interest</h1>
  <p>We've received your response and will be in touch soon to talk through how an AI agent could work for your business.</p>

  <a href="javascript:history.back()" class="back">← Back to agent types</a>

  <hr class="divider">
  <div class="footer">Nelson, BC · AI agent market research</div>
</div>
</body>
</html>
